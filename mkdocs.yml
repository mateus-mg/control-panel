site_name: Control Panel Documentation
site_description: Server management system for HD and Docker containers
site_author: mateus
site_url: https://mateus.github.io/control-panel

repo_name: mateus/control-panel
repo_url: https://github.com/mateus/control-panel

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - admonition
  - pymdownx.details
  - pymdownx.mark

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mateus
  generator: false

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/installation.md
    - getting-started/quick-start.md
    - getting-started/configuration.md
  - Architecture:
    - architecture/overview.md
    - architecture/modules.md
    - architecture/data-flow.md
  - Reference:
    - reference/cli.md
    - reference/backup-subsystem.md
    - reference/configuration-ref.md
  - Guides:
    - guides/hd-management.md
    - guides/docker-management.md
    - guides/backup-guide.md
    - guides/systemd-services.md
  - API:
    - api/modules.md
