services:
    nextcloud-db:
        image: postgres:15-alpine
        container_name: nextcloud-db
        restart: unless-stopped
        networks:
            - servidor_default
        environment:
            - POSTGRES_DB=nextcloud
            - POSTGRES_USER=nextcloud
            - POSTGRES_PASSWORD=523284
            - TZ=Europe/Lisbon
        volumes:
            - /media/mateus/Servidor/containers/config/nextcloud/postgres:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U nextcloud -d nextcloud" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    nextcloud:
        image: lscr.io/linuxserver/nextcloud:latest
        container_name: nextcloud
        restart: unless-stopped
        networks:
            - servidor_default
        ports:
            - "9000:80"
        depends_on:
            - nextcloud-db
        volumes:
            - /media/mateus/Servidor/containers/config/nextcloud:/config
            - /media/mateus/Servidor/containers/config/nextcloud/data:/data
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/Lisbon
            - POSTGRES_HOST=nextcloud-db
            - POSTGRES_DB=nextcloud
            - POSTGRES_USER=nextcloud
            - POSTGRES_PASSWORD=523284
        healthcheck:
            test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    nextcloud-redis:
        image: redis:7-alpine
        container_name: nextcloud-redis
        restart: unless-stopped
        networks:
            - servidor_default
        volumes:
            - /data

    onlyoffice:
        image: onlyoffice/documentserver:latest
        container_name: onlyoffice
        restart: unless-stopped
        networks:
            - servidor_default
        ports:
            - "9004:80"
        volumes:
            - /media/mateus/Servidor/containers/config/onlyoffice/data:/var/www/onlyoffice/Data
            - /media/mateus/Servidor/containers/config/onlyoffice/logs:/var/log/onlyoffice
        environment:
            - TZ=Europe/Lisbon

    kavita:
        image: jvmilazz0/kavita:latest
        container_name: kavita
        user: "1000:1000"
        restart: unless-stopped
        networks:
            - servidor_default
        ports:
            - "5000:5000"
        volumes:
            - /media/mateus/Servidor/containers/config/kavita:/kavita/config
            - /media/mateus/Servidor/containers/media/library/comics:/comics
            - /media/mateus/Servidor/containers/media/library/books:/books
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/Lisbon
        healthcheck:
            test: [ "CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5000'" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    navidrome:
        image: deluan/navidrome:latest
        container_name: navidrome
        user: "1000:1000"
        restart: unless-stopped
        networks:
            - servidor_default
        ports:
            - "4533:4533"
        volumes:
            - /media/mateus/Servidor/containers/config/navidrome:/data
            - /media/mateus/Servidor/containers/media/library/musics:/music
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/Lisbon
        healthcheck:
            test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4533/healthcheck" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

networks:
    servidor_default:
        external: true
        name: servidor_default
