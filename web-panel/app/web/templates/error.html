{% extends "base.html" %}

{% block title %}Erro - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900">
    <div class="text-center">
        <div class="mb-6">
            <i data-lucide="alert-triangle" class="w-16 h-16 text-red-400 mx-auto"></i>
        </div>
        <h1 class="text-4xl font-bold text-white mb-4">Ops!</h1>
        <p class="text-gray-400 mb-8">{{ error | default('Algo deu errado') }}</p>
        <a href="/dashboard" class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
            <i data-lucide="home" class="w-5 h-5 mr-2"></i>
            Voltar ao Dashboard
        </a>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
