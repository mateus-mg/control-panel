{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900">
    <div class="w-full max-w-md">
        <div class="bg-gray-800 rounded-lg shadow-lg p-8 border border-gray-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">{{ app_name }}</h1>
                <p class="text-gray-400">Acesse sua conta</p>
            </div>

            {% if error %}
            <div class="bg-red-500/20 border border-red-500 text-red-400 rounded-lg p-4 mb-6">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                        Usuário
                    </label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                           placeholder="Digite seu usuário">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                        Senha
                    </label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                           placeholder="Digite sua senha">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <i data-lucide="log-in" class="w-5 h-5 mr-2"></i>
                    Entrar
                </button>
            </form>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            &copy; 2026 {{ app_name }}
        </p>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
