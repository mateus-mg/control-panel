<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 border-r border-gray-700 hidden lg:block">
            <div class="p-6">
                <h1 class="text-xl font-bold text-white">{{ app_name }}</h1>
            </div>
            <nav class="mt-6">
                <a href="/dashboard" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                    Dashboard
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    <i data-lucide="container" class="w-5 h-5 mr-3"></i>
                    Docker
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    <i data-lucide="hard-drive" class="w-5 h-5 mr-3"></i>
                    HD Externo
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    <i data-lucide="archive" class="w-5 h-5 mr-3"></i>
                    Backups
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    <i data-lucide="settings" class="w-5 h-5 mr-3"></i>
                    Configurações
                </a>
            </nav>
            <div class="absolute bottom-0 w-64 p-6 border-t border-gray-700">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center mr-3">
                        <span class="text-sm font-medium">{{ user.username[:1].upper() if user else '?' }}</span>
                    </div>
                    <div>
                        <p class="text-sm text-white">{{ user.username if user else 'User' }}</p>
                        <a href="/logout" class="text-xs text-gray-400 hover:text-white">Sair</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <!-- Mobile Header -->
            <header class="lg:hidden bg-gray-800 border-b border-gray-700 p-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold">{{ app_name }}</h1>
                    <button class="text-gray-400 hover:text-white">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
